<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ranklify – DDCET Rank Booster. Smart exam preparation for Gujarat diploma students." />
    <meta name="theme-color" content="#050508" />
    <title>Ranklify – DDCET Rank Booster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow-x: hidden; }
      body {
        background: #050508;
        color: #e2e2f0;
        font-family: 'Sora', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Allow text selection only inside inputs and textareas */
      input, textarea, [contenteditable] {
        user-select: text !important;
        -webkit-user-select: text !important;
      }
      #root { height: 100%; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0d0d18; }
      ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a6a; }
      * { scrollbar-width: thin; scrollbar-color: #2a2a4a #0d0d18; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
